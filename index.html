<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy-Write</title>
    
    <!-- External Libraries -->
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <!-- Your Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">

    <div id="canvas-area">
        <canvas id="canvas"></canvas>
        <div id="text-input" contenteditable="true" spellcheck="false"></div>
    </div>
    
    <div class="top-left-corner">
        <button class="menu-btn" id="sidebarToggleBtn" title="Notebooks"><i data-feather="menu"></i></button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Easy-Write Notebook</span>
            <button class="icon-btn-sm" id="closeSidebarBtn"><i data-feather="chevron-left"></i></button>
        </div>
        <div class="page-list" id="pageList"></div>
        <button class="add-page-btn" id="addPageBtn"><i data-feather="plus" style="width:18px;"></i> Add Page</button>
    </div>

    <div class="panel" id="properties-panel">
        <div id="eraser-mode-row" style="display: none; width: 100%;">
            <div class="prop-label">Eraser Type</div>
            <div class="width-row" style="margin-bottom: 12px;">
                <button class="width-btn active" id="modeStrokeBtn" style="font-size: 12px; font-weight: 600;">Stroke</button>
                <button class="width-btn" id="modePixelBtn" style="font-size: 12px; font-weight: 600;">Normal</button>
            </div>
        </div>
        <div id="font-style-row" style="display: none; width: 100%;">
            <div class="prop-label">Text Font</div>
            <select id="fontSelect" style="width: 100%; padding: 8px 12px; margin-bottom: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); background: var(--bg-panel); color: var(--text-main); font-size: 13px; outline: none; cursor: pointer;">
                <option value="'Segoe Script', 'Bradley Hand', cursive">Pen / Cursive</option>
                <option value="Arial, Helvetica, sans-serif">Clean / Sans-Serif</option>
                <option value="'Times New Roman', Times, serif">Formal / Serif</option>
                <option value="'Courier New', Courier, monospace">Typewriter / Mono</option>
            </select>
        </div>
        
        <div style="width: 100%;">
            <div class="prop-label">Stroke width</div>            
            <div class="width-row">
                <button class="width-btn" data-width="2" title="Fine"><div class="w-line" style="height: 2px;"></div></button>
                <button class="width-btn active" data-width="4" title="Medium"><div class="w-line" style="height: 4px;"></div></button>
                <button class="width-btn" data-width="7" title="Bold"><div class="w-line" style="height: 6px;"></div></button>
                <button class="width-btn" data-width="12" title="Extra Bold"><div class="w-line" style="height: 10px;"></div></button>
                <button class="width-btn" data-width="20" title="Marker"><div class="w-line" style="height: 16px; border-radius: 4px;"></div></button>
            </div>
        </div>
        <div style="width: 100%;">
            <div class="prop-label">Stroke</div>
            <div class="color-row">
                <div class="color-swatch active" style="background: #1e1e1e;" data-color="#1e1e1e" id="defaultColorSwatch"></div>
                <div class="color-swatch" style="background: #e03131;" data-color="#e03131"></div>
                <div class="color-swatch" style="background: #2f9e44;" data-color="#2f9e44"></div>
                <div class="color-swatch" style="background: #1971c2;" data-color="#1971c2"></div>
                <div class="color-swatch" style="background: #f08c00;" data-color="#f08c00"></div>
            </div>
        </div>
    </div>

    <div class="panel" id="top-toolbar">
        <div class="toolbar-group">
            <button class="icon-btn" id="lockBtn" title="Lock Page (Read-Only)"><i data-feather="unlock"></i></button>
        </div>
        <div class="divider"></div>
        <div class="toolbar-group">
            <button class="icon-btn" id="handBtn" title="Pan (H)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.5 15.5H8.5c-1.4 0-2.5-1.1-2.5-2.5v-4.5c0-.8.7-1.5 1.5-1.5s1.5.7 1.5 1.5v3.5"/>
                  <path d="M9 10.5V5.5c0-.8.7-1.5 1.5-1.5s1.5.7 1.5 1.5v5"/>
                  <path d="M12 10.5V4.5c0-.8.7-1.5 1.5-1.5s1.5.7 1.5 1.5v6"/>
                  <path d="M15 10.5V6.5c0-.8.7-1.5 1.5-1.5s1.5.7 1.5 1.5v6.5c0 3.3-2.7 6-6 6h-1.5c-2.5 0-4.5-2-4.5-4.5v-1.5"/>
                </svg>
            </button>
            <button class="icon-btn" id="selectBtn" title="Select (V)"><i data-feather="mouse-pointer"></i></button>
            <button class="icon-btn" id="lassoBtn" title="Lasso">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14.5 4.5A2.5 2.5 0 0 0 12 2 2.5 2.5 0 0 0 9.5 4.5a2.5 2.5 0 0 0 1.6 2.3c-1.3 2.1-1.3 4.9.4 6.8 1.9 2.2 5.1 2.5 7.4.9a6 6 0 0 0-2.2-10z"></path>
                  <path d="M11 12.5 5 21"></path>
                </svg>
            </button>
        </div>
        <div class="divider"></div>
        <div class="toolbar-group">
            <button class="icon-btn" id="rectBtn" title="Rectangle (R)"><i data-feather="square"></i></button>
            <button class="icon-btn" id="diamondBtn" title="Diamond"><i data-feather="hexagon"></i></button>
            <button class="icon-btn" id="circleBtn" title="Ellipse (O)"><i data-feather="circle"></i></button>
            <button class="icon-btn" id="arrowBtn" title="Arrow"><i data-feather="arrow-right"></i></button>
            <button class="icon-btn" id="lineBtn" title="Line (L)"><i data-feather="minus"></i></button>
        </div>
        <div class="divider"></div>
        <div class="toolbar-group">
            <button class="icon-btn active" id="penBtn" title="Pen (P)" style="width: auto; padding: 0 8px; gap: 2px;">
                <i data-feather="edit-2"></i>
                <i data-feather="chevron-down" style="width: 14px; height: 14px; stroke-width: 3;"></i>
            </button>
            <button class="icon-btn" id="highlighterBtn" title="Highlighter" style="width: auto; padding: 0 8px; gap: 2px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m9 11-6 6v3h9l3-3"/>
                  <path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/>
                </svg>
                <i data-feather="chevron-down" style="width: 14px; height: 14px; stroke-width: 3;"></i>
            </button>
            <button class="icon-btn" id="pointerBtn" title="Laser Pointer"><i data-feather="crosshair"></i></button>
            <button class="icon-btn" id="textBtn" title="Text (T)" style="width: auto; padding: 0 8px; gap: 2px;">
                <i data-feather="type"></i>
                <i data-feather="chevron-down" style="width: 14px; height: 14px; stroke-width: 3;"></i>
            </button>
            <button class="icon-btn" id="imageBtn" title="Insert Image"><i data-feather="image"></i></button>
            <button class="icon-btn" id="eraserBtn" title="Eraser (E)" style="width: auto; padding: 0 8px; gap: 2px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path>
                    <path d="M22 21H7"></path>
                    <path d="m5 11 9 9"></path>
                </svg>
                <i data-feather="chevron-down" style="width: 14px; height: 14px; stroke-width: 3;"></i>
            </button>
        </div>
        <div class="divider"></div>
        <div class="toolbar-group">
            <button class="icon-btn" id="ocrToggleBtn" title="Auto-OCR: OFF"><i data-feather="zap-off"></i></button>
            <button class="icon-btn" id="mathLockBtn" title="Math Mode: OFF">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 5 8 5 13 12 8 19 16 19"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <div class="bottom-left-corner">
        <div class="pill-panel">
            <button class="icon-btn-sm" id="zoomOutBtn"><i data-feather="minus"></i></button>
            <span class="zoom-text" id="zoomText">100%</span>
            <button class="icon-btn-sm" id="zoomInBtn"><i data-feather="plus"></i></button>
        </div>
        <div class="pill-panel">
            <button class="icon-btn-sm" id="undoBtn" disabled><i data-feather="corner-up-left"></i></button>
            <button class="icon-btn-sm" id="redoBtn" disabled><i data-feather="corner-up-right"></i></button>
        </div>
    </div>
    
    <div class="bottom-right-corner">
        <button class="menu-btn" id="bgToggleBtn" title="Change Background"><i data-feather="align-justify"></i></button>
        <button class="menu-btn" id="themeToggleBtn" title="Toggle Theme"><i data-feather="moon"></i></button>
        <button class="share-btn" id="shareBtn" title="Export as PDF"><i data-feather="share-2" style="width: 18px;"></i></button>    
    </div>

    <div class="panel floating-results" id="results-panel">
        <div class="results-top-bar">
            <div class="results-header">AI Transcript</div>
            <button class="text-btn" id="copyBtn"><i data-feather="copy" style="width:14px; margin-right:4px;"></i>Copy</button>
        </div>
        <div id="output" class="output-display"><span style="color: var(--text-muted); font-style: italic;">Processing...</span></div>
    </div>

    <!-- Your Custom Logic -->
    <script src="main.js"></script>
</body>
</html>
